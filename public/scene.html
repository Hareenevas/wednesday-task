<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nevermore — Scene</title>
  <meta name="description" content="A revealed Wednesday scene." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-scene">
  <main class="scene-shell fade-in">
    <section class="hero">
      <p class="eyebrow">Revealed Scene</p>
      <h1 id="sceneTitle" class="hero-title">—</h1>
      <p id="sceneShort" class="hero-sub">—</p>
    </section>

    <section class="scene-grid">
      <article class="scene-card">
        <h3>Mood</h3>
        <p id="sceneMood">—</p>
      </article>
      <article class="scene-card">
        <h3>Location</h3>
        <p id="sceneLocation">—</p>
      </article>
      <article class="scene-card">
        <h3>Significance</h3>
        <p id="sceneSignificance">—</p>
      </article>
    </section>

    <section class="scene-detail">
      <h2>The Scene</h2>
      <p id="sceneDetail">—</p>
    </section>

    <div class="actions">
      <button type="button" id="generateAnother" class="btn btn-primary">Generate Another Scene</button>
      <a href="login.html" class="btn btn-ghost">Sign Out</a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
