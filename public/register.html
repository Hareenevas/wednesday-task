<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nevermore — Registration</title>
  <meta name="description" content="Register at Nevermore Academy." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-register">
  <main class="auth-shell fade-in">
    <section class="auth-card wide">
      <header class="auth-header">
        <p class="eyebrow">Student Registration</p>
        <h1 class="title">Join Nevermore</h1>
        <p class="subtitle" id="welcomeLine">Complete your enrollment.</p>
      </header>

      <form id="registerForm" class="form" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Wednesday Addams" />
          <small class="error" data-error-for="fullName"></small>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@nevermore.edu" />
            <small class="error" data-error-for="email"></small>
          </div>

          <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="10" max="120" placeholder="16" />
            <small class="error" data-error-for="age"></small>
          </div>
        </div>

        <div class="field">
          <label for="character">Favorite Wednesday Character</label>
          <select id="character" name="character">
            <option value="">Select a character…</option>
            <option>Wednesday Addams</option>
            <option>Enid Sinclair</option>
            <option>Thing</option>
            <option>Morticia Addams</option>
            <option>Gomez Addams</option>
            <option>Xavier Thorpe</option>
            <option>Tyler Galpin</option>
            <option>Bianca Barclay</option>
            <option>Principal Weems</option>
            <option>Uncle Fester</option>
          </select>
          <small class="error" data-error-for="character"></small>
        </div>

        <button type="submit" class="btn btn-primary">Complete Registration</button>
      </form>

      <div id="revealSection" class="reveal hidden">
        <p class="reveal-note">Welcome to Nevermore. The shadows have something to show you.</p>
        <button type="button" id="revealBtn" class="btn btn-ghost">Reveal a Wednesday Scene</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
